name: Trigger Azure Deployment

on:
  workflow_dispatch:
    inputs:
      target_service:
        description: "Select the target Azure service"
        required: true
        type: choice
        options:
          - webapp
          - function
      slot_name:
        description: "Select the deployment slot"
        required: true
        type: choice
        options:
          - dev
          - uat
          - production
      runtime:
        description: "Select the application runtime"
        required: true
        type: choice
        options:
          - python
          - node
          - dotnet
      runtime_version:
        description: "Specify the runtime version (e.g., 20, 3.11, 8.0.x)"
        required: true
        type: string
      app_name:
        description: "Azure resource name (exact App Service or Function App name)"
        required: true
        type: string
      working_directory:
        description: "Directory containing the application code"
        required: false
        type: string
        default: "."

# Security: Global execution strictly restricted
permissions: {}

jobs:
  deploy_webapp:
    name: Web App Pipeline
    # Only allow if strictly webapp AND python (Node/.NET Web Apps are not supported in this repo structure)
    if: ${{ github.event.inputs.target_service == 'webapp' && github.event.inputs.runtime == 'python' }}
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-webapp-deploy.yml
    with:
      runtime_version: ${{ github.event.inputs.runtime_version }}
      environment: ${{ github.event.inputs.slot_name == 'production' && 'prod' || github.event.inputs.slot_name }}
      slot_name: ${{ github.event.inputs.slot_name }}
      app_name: ${{ github.event.inputs.app_name }}
      working_directory: ${{ github.event.inputs.working_directory != '.' && github.event.inputs.working_directory || format('./src/{0}-{1}', github.event.inputs.target_service, github.event.inputs.runtime) }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy_function_node:
    name: Function App Pipeline (Node)
    if: ${{ github.event.inputs.target_service == 'function' && github.event.inputs.runtime == 'node' }}
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-function-deploy.yml
    with:
      runtime: ${{ github.event.inputs.runtime }}
      runtime_version: ${{ github.event.inputs.runtime_version }}
      environment: ${{ github.event.inputs.slot_name == 'production' && 'prod' || github.event.inputs.slot_name }}
      slot_name: ${{ github.event.inputs.slot_name }}
      app_name: ${{ github.event.inputs.app_name }}
      working_directory: ${{ github.event.inputs.working_directory != '.' && github.event.inputs.working_directory || format('./src/{0}-{1}', github.event.inputs.target_service, github.event.inputs.runtime) }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy_function_python:
    name: Function App Pipeline (Python)
    if: ${{ github.event.inputs.target_service == 'function' && github.event.inputs.runtime == 'python' }}
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-function-deploy.yml
    with:
      runtime: ${{ github.event.inputs.runtime }}
      runtime_version: ${{ github.event.inputs.runtime_version }}
      environment: ${{ github.event.inputs.slot_name == 'production' && 'prod' || github.event.inputs.slot_name }}
      slot_name: ${{ github.event.inputs.slot_name }}
      app_name: ${{ github.event.inputs.app_name }}
      working_directory: ${{ github.event.inputs.working_directory != '.' && github.event.inputs.working_directory || format('./src/{0}-{1}', github.event.inputs.target_service, github.event.inputs.runtime) }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy_function_dotnet:
    name: Function App Pipeline (.NET)
    if: ${{ github.event.inputs.target_service == 'function' && github.event.inputs.runtime == 'dotnet' }}
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-function-deploy.yml
    with:
      runtime: ${{ github.event.inputs.runtime }}
      runtime_version: ${{ github.event.inputs.runtime_version }}
      environment: ${{ github.event.inputs.slot_name == 'production' && 'prod' || github.event.inputs.slot_name }}
      slot_name: ${{ github.event.inputs.slot_name }}
      app_name: ${{ github.event.inputs.app_name }}
      working_directory: ${{ github.event.inputs.working_directory != '.' && github.event.inputs.working_directory || format('./src/{0}-{1}', github.event.inputs.target_service, github.event.inputs.runtime) }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
