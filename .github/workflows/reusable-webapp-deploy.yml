name: Reusable Azure Web App Deploy

on:
  workflow_call:
    inputs:
      runtime_version:
        description: "Version of the Python runtime (e.g., 3.11)"
        required: true
        type: string
      environment:
        description: "Environment to execute the deployment against (dev/uat/prod)"
        required: true
        type: string
      slot_name:
        description: "Azure deployment slot name (dev, uat, or production)"
        required: true
        type: string
      app_name:
        description: "Target resource name in Azure"
        required: true
        type: string
      working_directory:
        description: "Path to the app source code"
        required: false
        type: string
        default: "."
    secrets:
      AZURE_CLIENT_ID:
        description: "Application (client) ID of the Service Principal"
        required: true
      AZURE_TENANT_ID:
        description: "Directory (tenant) ID of the Azure Active Directory"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "Azure Subscription ID"
        required: true

jobs:
  build:
    name: Build Web App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.runtime_version }}

      - name: Prepare Python Artifact
        working-directory: ${{ inputs.working_directory }}
        run: |
          python -m venv .venv
          source .venv/bin/activate
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          zip -rq ../deployment-artifact.zip .

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package-${{ github.run_id }}
          path: deployment-artifact.zip
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy Web App (${{ inputs.slot_name }} slot)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ inputs.environment }}
      url: "https://${{ inputs.app_name }}${{ inputs.slot_name != 'production' && format('-{0}', inputs.slot_name) || '' }}.azurewebsites.net"
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package-${{ github.run_id }}
          path: ./deploy-drop

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.app_name }}
          package: ./deploy-drop/deployment-artifact.zip
          slot-name: ${{ inputs.slot_name }}
