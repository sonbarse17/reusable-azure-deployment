name: Reusable Azure Deploy

on:
  workflow_call:
    inputs:
      target_service:
        description: "Azure service type (webapp/function)"
        required: true
        type: string
      function_runtime:
        description: "Runtime language if target is function"
        required: true
        type: string
      environment:
        description: "Environment to execute the deployment against"
        required: true
        type: string
      app_name:
        description: "Target resource name in Azure"
        required: true
        type: string
    secrets:
      PUBLISH_PROFILE_WEBAPP_NODE:
        description: "Publish Profile for Node.js Web App"
        required: false
      PUBLISH_PROFILE_FUNC_NODE:
        description: "Publish Profile for Node.js Function App"
        required: false
      PUBLISH_PROFILE_FUNC_PYTHON:
        description: "Publish Profile for Python Function App"
        required: false
      PUBLISH_PROFILE_FUNC_DOTNET:
        description: "Publish Profile for .NET Function App"
        required: false

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------
      # Node.js Web App
      # -----------------------------------------------------------------
      - name: Setup Node.js (Web App)
        if: ${{ inputs.target_service == 'webapp' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Web App Artifact
        if: ${{ inputs.target_service == 'webapp' }}
        working-directory: ./src/webapp-node
        run: |
          npm install --omit=dev
          zip -rq ../../deployment-artifact.zip .

      # -----------------------------------------------------------------
      # Python Function App
      # -----------------------------------------------------------------
      - name: Setup Python (Function App)
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare Python Function Artifact
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'python' }}
        working-directory: ./src/function-python
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt
          zip -rq ../../deployment-artifact.zip .

      # -----------------------------------------------------------------
      # Node.js Function App
      # -----------------------------------------------------------------
      - name: Setup Node.js (Function App)
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Node.js Function Artifact
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'node' }}
        working-directory: ./src/function-node
        run: |
          npm install --omit=dev
          zip -rq ../../deployment-artifact.zip .

      # -----------------------------------------------------------------
      # .NET Function App
      # -----------------------------------------------------------------
      - name: Setup .NET (Function App)
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Prepare .NET Function Artifact
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'dotnet' }}
        working-directory: ./src/function-dotnet
        run: |
          dotnet publish -c Release -o ./publish_output
          cd publish_output
          zip -rq ../../../deployment-artifact.zip .

      # -----------------------------------------------------------------
      # Publish Build Artifact
      # -----------------------------------------------------------------
      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ github.run_id }}
          path: deployment-artifact.zip
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}

    steps:
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: package-${{ github.run_id }}
          path: ./deploy-drop

      - name: Deploy Azure Web App (Node.js)
        if: ${{ inputs.target_service == 'webapp' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.app_name }}
          publish-profile: ${{ secrets.PUBLISH_PROFILE_WEBAPP_NODE }}
          package: ./deploy-drop/deployment-artifact.zip

      - name: Deploy Azure Function (Node.js)
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'node' }}
        uses: azure/functions-action@v1
        with:
          app-name: ${{ inputs.app_name }}
          publish-profile: ${{ secrets.PUBLISH_PROFILE_FUNC_NODE }}
          package: ./deploy-drop/deployment-artifact.zip

      - name: Deploy Azure Function (Python)
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'python' }}
        uses: azure/functions-action@v1
        with:
          app-name: ${{ inputs.app_name }}
          publish-profile: ${{ secrets.PUBLISH_PROFILE_FUNC_PYTHON }}
          package: ./deploy-drop/deployment-artifact.zip

      - name: Deploy Azure Function (.NET)
        if: ${{ inputs.target_service == 'function' && inputs.function_runtime == 'dotnet' }}
        uses: azure/functions-action@v1
        with:
          app-name: ${{ inputs.app_name }}
          publish-profile: ${{ secrets.PUBLISH_PROFILE_FUNC_DOTNET }}
          package: ./deploy-drop/deployment-artifact.zip
