name: Reusable Azure Function Deploy

on:
  workflow_call:
    inputs:
      runtime:
        description: "Runtime language (python/node/dotnet)"
        required: true
        type: string
      runtime_version:
        description: "Version of the runtime (e.g., 20, 3.11, 8.0.x)"
        required: true
        type: string
      environment:
        description: "Environment to execute the deployment against (dev/uat/prod)"
        required: true
        type: string
      slot_name:
        description: "Azure deployment slot name (dev, uat, or production)"
        required: true
        type: string
      app_name:
        description: "Target resource name in Azure"
        required: true
        type: string
      working_directory:
        description: "Path to the app source code"
        required: false
        type: string
        default: "."
    secrets:
      PUBLISH_PROFILE:
        description: "Publish Profile for the Function App"
        required: true

jobs:
  build:
    name: Build Function App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------
      # Setup Runtimes (Dynamic Version)
      # -----------------------------------------------------------------
      - name: Setup Python
        if: ${{ inputs.runtime == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.runtime_version }}

      - name: Setup Node.js
        if: ${{ inputs.runtime == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.runtime_version }}

      - name: Setup .NET
        if: ${{ inputs.runtime == 'dotnet' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.runtime_version }}

      # -----------------------------------------------------------------
      # Prepare Artifacts
      # -----------------------------------------------------------------
      - name: Prepare Python Artifact
        if: ${{ inputs.runtime == 'python' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          python -m venv .venv
          source .venv/bin/activate
          # Specific Azure Function python target folder convention
          if [ -f "requirements.txt" ]; then pip install --target=".python_packages/lib/site-packages" -r requirements.txt; fi
          zip -rq ../deployment-artifact.zip .

      - name: Prepare Node.js Artifact
        if: ${{ inputs.runtime == 'node' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -f "package.json" ]; then npm install --omit=dev; fi
          zip -rq ../deployment-artifact.zip .

      - name: Prepare .NET Artifact
        if: ${{ inputs.runtime == 'dotnet' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          dotnet publish -c Release -o ./publish_output
          cd publish_output
          zip -rq ../../deployment-artifact.zip .

      # -----------------------------------------------------------------
      # Publish Build Artifact
      # -----------------------------------------------------------------
      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-package-${{ github.run_id }}
          path: deployment-artifact.zip
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy Function App (${{ inputs.slot_name }} slot)
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}

    steps:
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: function-package-${{ github.run_id }}
          path: ./deploy-drop

      - name: Deploy to Azure Function
        uses: azure/functions-action@v1
        with:
          app-name: ${{ inputs.app_name }}
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}
          package: ./deploy-drop/deployment-artifact.zip
          slot-name: ${{ inputs.slot_name }}
